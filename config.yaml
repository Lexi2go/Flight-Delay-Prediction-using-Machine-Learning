paths:
  input:
    arrivals: "inputs/Detailed_Statistics_Arrivals.csv"
    departures: "inputs/Detailed_Statistics_Departures.csv"
  
  output:
    plots: "outputs/flight_delay_analysis.png"
    model: "outputs/model.txt"
    metrics: "outputs/metrics.json"

model:
  threshold_default: 0.5
  threshold_scan:
    start: 0.1
    end: 0.9
    step: 0.01

split:
  train_until_year: 2015

lightgbm:
  base:
    learning_rate: 0.05
    num_leaves: 63
    min_child_samples: 50

  optimized:
    learning_rate: 0.03
    num_leaves: 127
    min_child_samples: 30
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    lambda_l1: 0.1
    lambda_l2: 0.1