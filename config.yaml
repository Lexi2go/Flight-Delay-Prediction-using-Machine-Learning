paths:
  input:
    arrivals: "inputs/Detailed_Statistics_Arrivals.csv"
    departures: "inputs/Detailed_Statistics_Departures.csv"
  
  output:
    plots: "outputs/dashboard.png"
    model: "outputs/lgb_model.txt"
    metrics: "outputs/metrics.json"

split:
  train_until_year: 2013
  validation_years: [2014, 2015]
  test_from_year: 2021

model:
  threshold_default: 0.5
  threshold_scan:
    start: 0.1
    end: 0.9
    step: 0.01

lightgbm:
  optimized:
    learning_rate: 0.03
    num_leaves: 127
    min_child_samples: 30
    feature_pre_filter: false
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    lambda_l1: 0.1
    lambda_l2: 0.1